<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LEXA Icon Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#1a1a2e,#0f3460); min-height:100vh; color:#fff; padding:40px 20px; }
  h1 { text-align:center; font-size:2rem; background:linear-gradient(90deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  .sub { text-align:center; color:#94a3b8; margin-bottom:40px; }
  .zone { border:2px dashed #a855f7; border-radius:16px; padding:40px; text-align:center; max-width:500px; margin:0 auto 40px; cursor:pointer; background:rgba(168,85,247,.05); }
  .zone:hover { background:rgba(168,85,247,.12); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; max-width:900px; margin:0 auto 32px; }
  .card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:16px; text-align:center; }
  .card canvas { border-radius:6px; max-width:100%; }
  .lbl { font-size:.78rem; color:#94a3b8; margin:8px 0 3px; }
  .sz { font-size:.72rem; color:#64748b; margin-bottom:10px; }
  button { background:linear-gradient(135deg,#a855f7,#ec4899); color:#fff; border:none; padding:8px; border-radius:8px; cursor:pointer; font-size:.8rem; font-weight:600; width:100%; }
</style>
</head>
<body>
<h1>LEXA Icon Generator</h1>
<p class="sub">Upload your logo → Download all icon sizes instantly</p>
<div class="zone" onclick="document.getElementById('fi').click()">
  <p style="font-size:3rem">📁</p>
  <p style="color:#cbd5e1">Click or drag your LEXA logo here</p>
  <input id="fi" type="file" accept="image/*" style="display:none">
</div>
<div id="out" style="display:none">
  <p style="max-width:900px;margin:0 auto 16px;color:#a855f7;font-weight:600;border-bottom:1px solid rgba(168,85,247,.3);padding-bottom:8px">Browser Favicons</p>
  <div class="grid" id="fav"></div>
  <p style="max-width:900px;margin:0 auto 16px;color:#a855f7;font-weight:600;border-bottom:1px solid rgba(168,85,247,.3);padding-bottom:8px">App Icons</p>
  <div class="grid" id="app"></div>
</div>
<script>
const all=[
  {id:'fav',items:[{s:16,n:'favicon-16x16.png'},{s:32,n:'favicon-32x32.png'},{s:48,n:'favicon-48x48.png'}]},
  {id:'app',items:[{s:180,n:'apple-touch-icon.png'},{s:192,n:'icon-192x192.png'},{s:512,n:'icon-512x512.png'},{s:1024,n:'icon-1024x1024.png'}]}
];
document.getElementById('fi').onchange=e=>{
  const img=new Image();
  const r=new FileReader();
  r.onload=ev=>{img.onload=()=>{
    document.getElementById('out').style.display='block';
    all.forEach(({id,items})=>{
      const g=document.getElementById(id); g.innerHTML='';
      items.forEach(({s,n})=>{
        const cv=document.createElement('canvas'); cv.width=cv.height=s;
        cv.getContext('2d').drawImage(img,0,0,s,s);
        const d=Math.min(s,110);
        cv.style.width=cv.style.height=d+'px';
        const card=document.createElement('div'); card.className='card';
        const lb=document.createElement('div'); lb.className='lbl'; lb.textContent=n.replace('.png','');
        const sz=document.createElement('div'); sz.className='sz'; sz.textContent=s+'×'+s+' px';
        const btn=document.createElement('button'); btn.textContent='⬇ Download';
        btn.onclick=()=>{const a=document.createElement('a');a.download=n;a.href=cv.toDataURL('image/png');a.click();};
        card.append(cv,lb,sz,btn); g.appendChild(card);
      });
    });
  }; img.src=ev.target.result;};
  r.readAsDataURL(e.target.files[0]);
};
const z=document.querySelector('.zone');
z.ondragover=e=>{e.preventDefault();z.style.background='rgba(168,85,247,.2)';};
z.ondragleave=()=>z.style.background='rgba(168,85,247,.05)';
z.ondrop=e=>{e.preventDefault();z.style.background='rgba(168,85,247,.05)';document.getElementById('fi').files=e.dataTransfer.files;document.getElementById('fi').onchange({target:{files:e.dataTransfer.files}});};
</script>
</body>
</html>
